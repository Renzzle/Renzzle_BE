services:
  app:
    image: ${APP_IMAGE:-renzzle/github-action:latest}
    ports:
      - "9001:9001"
    env_file:
      - .env
    dns:
      - 8.8.8.8
      - 1.1.1.1
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    volumes:
      - app-logs:/app/logs
    networks:
      - app-network
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  caddy:
    image: caddy:2-alpine
    command: caddy reverse-proxy --from :80 --to app:9001
    ports:
      - "${HTTP_HOST_PORT:-80}:80"
    networks:
      - app-network
    depends_on:
      - app

  db:
    container_name: mysql
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    volumes:
      - ./mysql-data:/var/lib/mysql
    ports:
      - "${MYSQL_BIND_IP:-0.0.0.0}:${MYSQL_HOST_PORT:-3306}:3306"
    networks:
      - app-network
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    container_name: redis
    image: redis:7.0.12
    volumes:
      - ./redis-data:/data
    ports:
      - "${REDIS_BIND_IP:-127.0.0.1}:${REDIS_HOST_PORT:-16379}:6379"
    networks:
      - app-network
    command: redis-server --requirepass ${REDIS_PASSWORD}
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD}

  promtail:
    profiles:
      - observability
    image: grafana/promtail:2.9.4
    entrypoint:
      - /bin/sh
      - -c
    volumes:
      - app-logs:/var/log/app
      - ./promtail/config.yml:/etc/promtail/config.yml
    environment:
      LOKI_TOKEN: ${LOKI_TOKEN}
    command:
      - |
        mkdir -p /run/promtail
        printf '%s' "$$LOKI_TOKEN" > /run/promtail/token
        exec /usr/bin/promtail -config.file=/etc/promtail/config.yml
    networks:
      - app-network
    depends_on:
      - app

networks:
  app-network:
    driver: bridge

volumes:
  app-logs:
