<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title.puzzleEdit">Renzzle Admin - Edit Puzzle</title>
  <link rel="stylesheet" href="/assets/admin/puzzle-edit.css">
  <link rel="stylesheet" href="/assets/admin/common.css">
  <script src="/assets/admin/i18n.js"></script>
</head>
<body>
  <div class="header">
    <div>
      <h1>Renzzle Admin</h1>
      <span class="user-info" th:if="${userEmail}" th:text="${userEmail}"></span>
    </div>
    <div class="header-actions">
      <a th:href="@{/admin/pack-detail(packId=${packId})}" class="btn" data-i18n="common.backToPack">Back to Pack</a>
      <th:block th:replace="~{admin/fragments :: languageSelect}"></th:block>
      <a href="/admin/logout" class="btn" data-i18n="common.logout">Log out</a>
    </div>
  </div>

  <th:block th:replace="~{admin/fragments :: siteNav(true, false, false)}"></th:block>
  <th:block th:replace="~{admin/fragments :: uiKit}"></th:block>

  <main class="admin-shell">
    <div id="packInfoBox" class="pack-context-bar" hidden>
      <div class="pack-context-main">
        <div class="pack-context-kicker" data-i18n="puzzleForm.packInfo">Pack Info</div>
        <h2 class="pack-context-title" id="packTitle">-</h2>
        <div class="pack-context-meta" aria-label="Pack metadata">
          <span class="pack-context-meta-item"><span data-i18n="common.author">Author</span><strong id="packAuthor">-</strong></span>
          <span class="pack-context-meta-item"><span data-i18n="common.difficulty">Difficulty</span><strong id="packDifficulty">-</strong></span>
          <span class="pack-context-meta-item"><span data-i18n="common.price">Price</span><strong id="packPrice">-</strong></span>
        </div>
        <p class="pack-context-description" id="packDescription">-</p>
      </div>
      <a th:href="@{/admin/pack-detail(packId=${packId})}" class="btn" data-i18n="common.puzzleList">Puzzle List</a>
    </div>

  <section class="section">
    <h2 data-i18n="puzzleForm.editHeading">Edit Puzzle</h2>
    <input type="hidden" id="problemPuzzleId" th:value="${puzzleId}">

    <label for="problemPuzzleIndex"><span data-i18n="puzzleForm.orderLabel">Puzzle Order</span> <small data-i18n="puzzleForm.orderHelp">Leave empty to append as the last order</small></label>
    <input type="number" id="problemPuzzleIndex" min="1" data-i18n-placeholder="puzzleForm.orderPlaceholder" placeholder="Leave empty to append as the last order">

    <div class="board-editor-block">
      <div class="board-viz-row">
        <div class="board-main-panel">
          <canvas id="gomokuBoard" class="gomoku-board" width="480" height="480" aria-label="Interactive Gomoku board" data-i18n="puzzleForm.canvasLabel" data-i18n-aria-label="puzzleForm.canvasLabel">Interactive Gomoku board.</canvas>
          <div class="board-toolbar" aria-label="Board controls">
            <button type="button" class="btn board-icon-btn" id="undoMoveBtn" title="Previous Move" aria-label="Previous Move" data-i18n-title="puzzleForm.previousMove" data-i18n-aria-label="puzzleForm.previousMove">◀</button>
            <button type="button" class="btn board-icon-btn" id="clearBoardBtn" title="Reset" aria-label="Reset" data-i18n-title="puzzleForm.clearBoard" data-i18n-aria-label="puzzleForm.clearBoard">↺</button>
            <button type="button" class="btn board-icon-btn" id="redoMoveBtn" title="Next Move" aria-label="Next Move" data-i18n-title="puzzleForm.nextMove" data-i18n-aria-label="puzzleForm.nextMove">▶</button>
            <button type="button" class="btn board-icon-btn" id="toggleModeBtn" title="Change Mode" aria-label="Change Mode" data-i18n-title="puzzleForm.toggleMode" data-i18n-aria-label="puzzleForm.toggleMode">⇄</button>
          </div>
        </div>
        <div class="board-side-panel board-compact-panel">
          <div class="board-status-strip">
            <div><span data-i18n="common.currentMode">Current Mode</span><strong id="modeLabel">Answer Input</strong></div>
            <div><span data-i18n="common.currentTurn">Current Turn</span><strong id="currentTurn">Black</strong></div>
          </div>
          <label for="problemBoardStatus" data-i18n="puzzleForm.boardStateLabel">Board State *</label>
          <input type="text" id="problemBoardStatus" class="compact-input" data-i18n-placeholder="puzzleForm.boardPlaceholder" placeholder="h8h9i8..." required>
          <label for="problemAnswer" data-i18n="puzzleForm.answerLabel">Answer *</label>
          <input type="text" id="problemAnswer" class="compact-input" data-i18n-placeholder="puzzleForm.answerPlaceholder" placeholder="h8h9i8..." maxlength="1023" required>
          <div class="board-field-grid">
            <div>
              <label for="problemDepth" data-i18n="puzzleForm.depthLabel">Depth</label>
              <input type="text" id="problemDepth" class="auto-calculated compact-input" readonly>
            </div>
            <div>
              <label for="problemWinColor" data-i18n="puzzleForm.winColorLabel">Win Color</label>
              <input type="text" id="problemWinColor" class="auto-calculated compact-input" readonly>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="edit-buttons">
      <button type="button" class="btn btn-edit" id="modifyPuzzleBtn" data-i18n="common.updatePuzzle">Update Puzzle</button>
      <button type="button" class="btn btn-delete" id="deletePuzzleBtn" data-i18n="common.puzzleDelete">Puzzle Delete</button>
    </div>
    <div id="editPuzzleMsg" class="msg"></div>
  </section>

  <script type="module" th:inline="javascript">
    const API_BASE = '';
    const packId = /*[[${packId}]]*/ 0;
    const puzzleId = /*[[${puzzleId}]]*/ 0;
    let currentPackDetail = null;

    const canvas = document.getElementById('gomokuBoard');
    const ctx = canvas.getContext('2d');
    const BOARD_SIZE = 15;
    const CELL_SIZE = 30;
    const MARGIN = 30;
    const CANVAS_LOGICAL_SIZE = 480;

    (function setupCanvasScale() {
      const dpr = globalThis.devicePixelRatio || 1;
      canvas.width = CANVAS_LOGICAL_SIZE * dpr;
      canvas.height = CANVAS_LOGICAL_SIZE * dpr;
      ctx.scale(dpr, dpr);
    })();
    const moves = [];
    const answerMoves = [];
    const redoMoves = [];
    const redoAnswerMoves = [];
    let isAnswerMode = true;  // Edit page starts in answer-entry mode because it loads a completed puzzle
    let currentPlayer = 'black';

    function toCanvasX(col) { return MARGIN + col * CELL_SIZE; }
    function toCanvasY(row) { return MARGIN + (14 - row) * CELL_SIZE; }

    function drawBoard() {
      ctx.fillStyle = '#F1DCA7';
      ctx.fillRect(0, 0, CANVAS_LOGICAL_SIZE, CANVAS_LOGICAL_SIZE);
      ctx.strokeStyle = '#6F5432';
      ctx.lineWidth = 1;
      for (let i = 0; i < BOARD_SIZE; i++) {
        const pos = MARGIN + i * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, MARGIN);
        ctx.lineTo(pos, MARGIN + (BOARD_SIZE - 1) * CELL_SIZE);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(MARGIN, pos);
        ctx.lineTo(MARGIN + (BOARD_SIZE - 1) * CELL_SIZE, pos);
        ctx.stroke();
      }
      const starPoints = [ [3, 3], [3, 11], [7, 7], [11, 3], [11, 11] ];
      starPoints.forEach(([row, col]) => {
        const x = toCanvasX(col);
        const y = toCanvasY(row);
        ctx.fillStyle = '#5E472A';
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.fillStyle = '#5E472A';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let c = 0; c < BOARD_SIZE; c++) {
        ctx.fillText(String.fromCodePoint(65 + c), toCanvasX(c), CANVAS_LOGICAL_SIZE - MARGIN / 2);
      }
      for (let r = 0; r < BOARD_SIZE; r++) {
        ctx.fillText(String(r + 1), MARGIN / 2, toCanvasY(r));
      }
    }

    function drawStone(row, col, player, moveNumber) {
      const x = toCanvasX(col);
      const y = toCanvasY(row);
      ctx.fillStyle = player === 'black' ? '#000' : '#fff';
      ctx.beginPath();
      ctx.arc(x, y, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = player === 'black' ? '#333' : '#999';
      ctx.lineWidth = 1;
      ctx.stroke();
      if (moveNumber) {
        ctx.fillStyle = player === 'black' ? '#fff' : '#000';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(moveNumber, x, y);
      }
    }

    function redrawBoard() {
      drawBoard();
      // Initial puzzle stones: no numbers
      moves.forEach((m) => drawStone(m.row, m.col, m.player, null));
      // Answer stones: show sequence numbers
      for (let i = 0; i < answerMoves.length; i++) {
        const m = answerMoves[i];
        drawStone(m.row, m.col, m.player, i + 1);
      }
      // Highlight five-in-a-row using visible stones
      const visible = [...moves, ...answerMoves];
      const line = findWinLine(visible);
      if (line) highlightWinLine(line);
    }

    // Find a same-color line of five or more in four directions
    function findWinLine(stones) {
      const occ = new Map();
      stones.forEach(m => occ.set(m.row + ',' + m.col, m.player));
      // Split this so Thymeleaf inline JavaScript does not treat double brackets as expressions
      const dirs = [
        [0, 1], [1, 0], [1, 1], [1, -1]
      ];
      for (const m of stones) {
        for (const [dr, dc] of dirs) {
          const line = [{ row: m.row, col: m.col }];
          let r = m.row + dr, c = m.col + dc;
          while (occ.get(r + ',' + c) === m.player) { line.push({ row: r, col: c }); r += dr; c += dc; }
          r = m.row - dr; c = m.col - dc;
          while (occ.get(r + ',' + c) === m.player) { line.unshift({ row: r, col: c }); r -= dr; c -= dc; }
          if (line.length >= 5) return line;
        }
      }
      return null;
    }

    function highlightWinLine(line) {
      const first = line[0], last = line[line.length - 1];
      ctx.strokeStyle = 'rgba(255,77,77,0.9)';
      ctx.lineWidth = 4;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(toCanvasX(first.col), toCanvasY(first.row));
      ctx.lineTo(toCanvasX(last.col), toCanvasY(last.row));
      ctx.stroke();
      ctx.lineWidth = 2.5;
      line.forEach(p => {
        ctx.beginPath();
        ctx.arc(toCanvasX(p.col), toCanvasY(p.row), CELL_SIZE / 2 - 1, 0, Math.PI * 2);
        ctx.stroke();
      });
      ctx.lineCap = 'butt';
    }

    function boardStatusToMoves(boardStatus) {
      const result = [];
      if (!boardStatus || boardStatus.trim() === '') return result;
      const regex = /([a-oA-O])(\d{1,2})/g;
      let match;
      let turnBlack = true;
      while ((match = regex.exec(boardStatus)) !== null) {
        const col = match[1].toLowerCase().codePointAt(0) - 'a'.codePointAt(0);
        const row = Number.parseInt(match[2], 10) - 1;
        if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
          result.push({ row, col, player: turnBlack ? 'black' : 'white' });
          turnBlack = !turnBlack;
        }
      }
      return result;
    }

    function movesToBoardStatus(arr) {
      return arr.map(m => {
        const rowChar = String.fromCodePoint('a'.codePointAt(0) + m.col);
        const colNum = m.row + 1;
        return rowChar + colNum;
      }).join('');
    }

    function updateBoardStatusInput() {
      document.getElementById('problemBoardStatus').value = movesToBoardStatus(moves);
      updateDepthAndWinColor();
    }

    function updateAnswerInput() {
      document.getElementById('problemAnswer').value = movesToBoardStatus(answerMoves);
      updateDepthAndWinColor();
    }

    function updateModeLabel() {
      document.getElementById('modeLabel').textContent = isAnswerMode ? adminT('puzzleForm.answerEntry') : adminT('puzzleForm.initialBoard');
      updateToolbarState();
    }

    function updateToolbarState() {
      document.getElementById('undoMoveBtn').disabled = isAnswerMode ? answerMoves.length === 0 : moves.length === 0;
      document.getElementById('redoMoveBtn').disabled = isAnswerMode ? redoAnswerMoves.length === 0 : redoMoves.length === 0;
    }

    function clearRedoHistory() {
      redoMoves.length = 0;
      redoAnswerMoves.length = 0;
    }

    function syncCurrentPlayer() {
      const total = moves.length + answerMoves.length;
      currentPlayer = total % 2 === 0 ? 'black' : 'white';
      document.getElementById('currentTurn').textContent = currentPlayer === 'black' ? adminT('common.black') : adminT('common.white');
    }

    function countMovesInBoardString(str) {
      if (!str || !str.trim()) return 0;
      const regex = /([a-o])(\d{1,2})/g;
      let count = 0;
      let match;
      while ((match = regex.exec(str)) !== null) {
        const num = Number.parseInt(match[2], 10);
        if (num >= 1 && num <= 15) count++;
      }
      return count;
    }

    function updateDepthAndWinColor() {
      const boardStatus = document.getElementById('problemBoardStatus').value.trim();
      const answer = document.getElementById('problemAnswer').value.trim();
      const boardMoves = countMovesInBoardString(boardStatus);
      const answerMovesCount = countMovesInBoardString(answer);
      const depthEl = document.getElementById('problemDepth');
      const winColorEl = document.getElementById('problemWinColor');
      let depthValue = '';
      if (answerMovesCount > 0) {
        depthValue = String(answerMovesCount);
      }
      depthEl.value = depthValue;
      let winColor = '';
      if (boardMoves > 0 && (isAnswerMode || answerMovesCount > 0)) {
        winColor = boardMoves % 2 === 0 ? 'BLACK' : 'WHITE';
      }
      winColorEl.value = winColor;
    }

    function isOccupied(row, col) {
      return moves.some(m => m.row === row && m.col === col) ||
             answerMoves.some(m => m.row === row && m.col === col);
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left;
      const y = e.clientY - rect.top;
      const col = Math.round((x - MARGIN) / CELL_SIZE);
      const row = 14 - Math.round((y - MARGIN) / CELL_SIZE);
      if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return;
      if (isOccupied(row, col)) return;
      const newMove = { row, col, player: currentPlayer };
      if (isAnswerMode) {
        answerMoves.push(newMove);
        redoAnswerMoves.length = 0;
        updateAnswerInput();
      } else {
        moves.push(newMove);
        redoMoves.length = 0;
        updateBoardStatusInput();
      }
      redrawBoard();
      syncCurrentPlayer();
      updateToolbarState();
    });

    async function switchToProblemMode() {
      const hasAnswer = answerMoves.length > 0 || document.getElementById('problemAnswer').value.trim() !== '';
      if (hasAnswer) {
        const ok = await adminConfirm(adminT('puzzleForm.answerResetConfirm'), {
          confirmText: adminT('common.check'),
          danger: true
        });
        if (!ok) return;
      }
      answerMoves.length = 0;
      redoAnswerMoves.length = 0;
      document.getElementById('problemAnswer').value = '';
      isAnswerMode = false;
      updateModeLabel();
      redrawBoard();
      updateDepthAndWinColor();
      syncCurrentPlayer();
      updateToolbarState();
    }

    document.getElementById('toggleModeBtn').addEventListener('click', async () => {
      if (isAnswerMode) {
        await switchToProblemMode();
        return;
      }
      isAnswerMode = true;
      updateModeLabel();
      updateDepthAndWinColor();
      syncCurrentPlayer();
      updateToolbarState();
    });

    document.getElementById('clearBoardBtn').addEventListener('click', () => {
      moves.length = 0;
      answerMoves.length = 0;
      clearRedoHistory();
      isAnswerMode = false;
      currentPlayer = 'black';
      updateModeLabel();
      document.getElementById('currentTurn').textContent = adminT('common.black');
      redrawBoard();
      updateBoardStatusInput();
      updateAnswerInput();
      updateToolbarState();
    });

    document.getElementById('undoMoveBtn').addEventListener('click', () => {
      if (isAnswerMode && answerMoves.length > 0) {
        redoAnswerMoves.push(answerMoves.pop());
        updateAnswerInput();
      } else if (!isAnswerMode && moves.length > 0) {
        redoMoves.push(moves.pop());
        updateBoardStatusInput();
      } else return;
      redrawBoard();
      syncCurrentPlayer();
      updateToolbarState();
    });

    document.getElementById('redoMoveBtn').addEventListener('click', () => {
      const redoStack = isAnswerMode ? redoAnswerMoves : redoMoves;
      const targetMoves = isAnswerMode ? answerMoves : moves;
      const nextMove = redoStack.pop();
      if (!nextMove) return;
      if (isOccupied(nextMove.row, nextMove.col)) {
        updateToolbarState();
        return;
      }
      targetMoves.push(nextMove);
      if (isAnswerMode) updateAnswerInput();
      else updateBoardStatusInput();
      redrawBoard();
      syncCurrentPlayer();
      updateToolbarState();
    });

    document.getElementById('problemBoardStatus').addEventListener('input', (e) => {
      const newMoves = boardStatusToMoves(e.target.value);
      moves.length = 0;
      moves.push(...newMoves);
      answerMoves.length = 0;
      clearRedoHistory();
      document.getElementById('problemAnswer').value = '';
      isAnswerMode = false;
      updateModeLabel();
      syncCurrentPlayer();
      redrawBoard();
      updateDepthAndWinColor();
    });

    document.getElementById('problemAnswer').addEventListener('input', (e) => {
      const answerStr = e.target.value.trim();
      const parsed = boardStatusToMoves(answerStr);
      answerMoves.length = 0;
      redoAnswerMoves.length = 0;
      parsed.forEach((m, i) => {
        const player = (moves.length + i) % 2 === 0 ? 'black' : 'white';
        answerMoves.push({ ...m, player });
      });
      syncCurrentPlayer();
      redrawBoard();
      updateDepthAndWinColor();
      updateToolbarState();
    });

    // Render the initial board before API and edit button bindings.
    // (Keep canvas rendering intact even if later binding fails.)
    drawBoard();
    updateModeLabel();
    syncCurrentPlayer();
    updateToolbarState();

    async function fetchWithAuth(url, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (options.body === undefined || options.body === null) {
        delete headers['Content-Type'];
      }
      const res = await fetch(url, { ...options, headers, credentials: 'same-origin' });
      if (res.status === 401 || res.status === 403) {
        alert(adminT('msg.sessionExpired'));
        globalThis.location.href = '/admin/logout';
        return null;
      }
      return res;
    }

    function getLocalizedPackInfo(detail) {
      const infos = detail['info'] || [];
      const currentLang = (globalThis.adminGetLanguage ? globalThis.adminGetLanguage() : 'en').toUpperCase();
      return infos.find(info => String(info['langCode'] || '').toUpperCase() === currentLang) || infos[0] || {};
    }

    function formatPackPrice(price) {
      if (price === null || price === undefined || price === '') return '-';
      const numericPrice = Number(price);
      return Number.isFinite(numericPrice) ? numericPrice.toLocaleString() : String(price);
    }

    function renderPackContext(detail) {
      const info = getLocalizedPackInfo(detail);
      document.getElementById('packInfoBox').hidden = false;
      document.getElementById('packTitle').textContent = info['title'] || adminT('common.untitled');
      document.getElementById('packAuthor').textContent = info['author'] || adminT('common.none');
      document.getElementById('packDifficulty').textContent = detail['difficulty'] || '-';
      document.getElementById('packPrice').textContent = formatPackPrice(detail['price']);
      const descEl = document.getElementById('packDescription');
      descEl.textContent = info['description'] || adminT('common.noDescription');
      descEl.classList.toggle('empty', !info['description']);
    }

    async function loadPackDetail() {
      try {
        const res = await fetchWithAuth(API_BASE + '/admin/training/pack/' + packId);
        if (!res) return;
        const data = await res.json();
        if (!data.isSuccess) {
          alert(adminT('packDetail.failedLoadPack'));
          globalThis.location.href = '/admin/pack-detail?packId=' + packId;
          return;
        }
        const detail = data.response;
        currentPackDetail = detail;
        renderPackContext(detail);
      } catch (err) {
        alert(adminT('common.errorPrefix', { message: err.message || '' }));
      }
    }

    async function loadPuzzleDetail() {
      try {
        const res = await fetchWithAuth(API_BASE + '/admin/training/puzzle-detail/' + puzzleId);
        if (!res) return;
        const data = await res.json();
        if (!data.isSuccess) {
          alert(adminT('puzzleForm.failedLoadPuzzle'));
          globalThis.location.href = '/admin/pack-detail?packId=' + packId;
          return;
        }

        const puzzle = data.response || {};
        const boardStatus = (puzzle['boardStatus'] || '').trim();
        const answer = (puzzle['answer'] || '').trim();

        document.getElementById('problemPuzzleId').value = String(puzzle['id'] ?? puzzleId);
        document.getElementById('problemPuzzleIndex').value = puzzle['trainingIndex'] == null ? '' : String(puzzle['trainingIndex']);
        document.getElementById('problemBoardStatus').value = boardStatus;
        document.getElementById('problemAnswer').value = answer;
        const puzzleDepth = String(puzzle['depth'] ?? '');
        document.getElementById('problemDepth').value = puzzleDepth === '0' ? '' : puzzleDepth;
        document.getElementById('problemWinColor').value = puzzle['winColor'] || '';

        moves.length = 0;
        moves.push(...boardStatusToMoves(boardStatus));

        answerMoves.length = 0;
        const parsedAnswerMoves = boardStatusToMoves(answer);
        parsedAnswerMoves.forEach((m, i) => {
          const player = (moves.length + i) % 2 === 0 ? 'black' : 'white';
          answerMoves.push({ ...m, player });
        });
        clearRedoHistory();

        isAnswerMode = true;  // Keep answer-entry mode when the completed puzzle is loaded.
        updateModeLabel();
        syncCurrentPlayer();
        redrawBoard();
        updateToolbarState();
      } catch (err) {
        alert(adminT('common.errorPrefix', { message: err.message || '' }));
      }
    }

    const modifyPuzzleBtn = document.getElementById('modifyPuzzleBtn');
    if (modifyPuzzleBtn) modifyPuzzleBtn.addEventListener('click', async () => {
      const msgEl = document.getElementById('editPuzzleMsg');
      msgEl.classList.remove('show', 'success', 'error');
      const puzzleIndexVal = document.getElementById('problemPuzzleIndex').value.trim();
      const puzzleIndex = puzzleIndexVal ? Number.parseInt(puzzleIndexVal, 10) : null;
      const boardStatus = document.getElementById('problemBoardStatus').value.trim();
      const answer = document.getElementById('problemAnswer').value.trim();
      const depthVal = document.getElementById('problemDepth').value.trim();
      const winColor = document.getElementById('problemWinColor').value.trim();
      const depth = depthVal ? Number.parseInt(depthVal, 10) : null;
      if (!boardStatus || !answer) {
        msgEl.textContent = adminT('puzzleForm.needBoardAnswer');
        msgEl.classList.add('show', 'error');
        return;
      }
      if (depth === 0 || !winColor) {
        msgEl.textContent = adminT('puzzleForm.invalidAnswer');
        msgEl.classList.add('show', 'error');
        return;
      }
      try {
        const body = { packId, boardStatus, answer, depth, winColor };
        if (puzzleIndex != null) body.puzzleIndex = puzzleIndex;
        const res = await fetchWithAuth(API_BASE + '/api/training/puzzle/' + puzzleId, {
          method: 'PATCH',
          body: JSON.stringify(body)
        });
        if (!res) return;
        const data = await res.json();
        if (!data.isSuccess) {
          msgEl.textContent = adminT('puzzleForm.updateFailed');
          msgEl.classList.add('show', 'error');
          return;
        }
        msgEl.textContent = adminT('puzzleForm.updated');
        msgEl.classList.add('show', 'success');
        setTimeout(() => { globalThis.location.href = '/admin/pack-detail?packId=' + packId; }, 500);
      } catch (err) {
        msgEl.textContent = adminT('common.errorPrefix', { message: err.message || '' });
        msgEl.classList.add('show', 'error');
      }
    });

    const deletePuzzleBtn = document.getElementById('deletePuzzleBtn');
    if (deletePuzzleBtn) deletePuzzleBtn.addEventListener('click', async () => {
      const ok = await adminConfirm(adminT('puzzleForm.deleteConfirm'), { confirmText: adminT('common.delete'), danger: true });
      if (!ok) return;
      try {
        const res = await fetchWithAuth(API_BASE + '/api/training/puzzle/' + puzzleId, { method: 'DELETE' });
        if (!res) return;
        const data = await res.json();
        if (!data.isSuccess) {
          alert(adminT('puzzleForm.deleteFailed'));
          return;
        }
        globalThis.location.href = '/admin/pack-detail?packId=' + packId;
      } catch (err) {
        alert(adminT('common.errorPrefix', { message: err.message || '' }));
      }
    });

    document.addEventListener('admin:language-change', () => {
      updateModeLabel();
      document.getElementById('currentTurn').textContent = currentPlayer === 'black' ? adminT('common.black') : adminT('common.white');
      if (currentPackDetail) renderPackContext(currentPackDetail);
    });

    await loadPackDetail();
    await loadPuzzleDetail();
  </script>
  </main>
</body>
</html>
