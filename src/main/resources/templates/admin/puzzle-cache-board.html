<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title.responseBoard">Renzzle - AI Response Board</title>
  <link rel="stylesheet" href="/assets/admin/puzzle-cache-board.css">
  <link rel="stylesheet" href="/assets/admin/common.css">
  <script src="/assets/admin/i18n.js"></script>
</head>
<body>
  <div class="header">
    <div>
      <h1>Renzzle Admin</h1>
      <span class="user-info" th:if="${userEmail}" th:text="${userEmail}"></span>
    </div>
    <div class="header-actions">
      <a th:if="${puzzleType == 'TRAINING' and packId != null}" th:href="@{/puzzle-cache/training-pack(packId=${packId})}" class="btn" data-i18n="common.responseEntryList">AI Response List</a>
      <a th:unless="${puzzleType == 'TRAINING' and packId != null}" th:href="@{/puzzle-cache}" class="btn" data-i18n="common.responseEntryList">AI Response List</a>
      <th:block th:replace="~{admin/fragments :: languageSelect}"></th:block>
      <a href="/admin/logout" class="btn" data-i18n="common.logout">Log out</a>
    </div>
  </div>

  <th:block th:replace="~{admin/fragments :: siteNav(false, false, true)}"></th:block>
  <th:block th:replace="~{admin/fragments :: uiKit}"></th:block>

  <main class="admin-shell">
    <div class="admin-page-heading">
      <div>
        <h2 data-i18n="cacheBoard.heading">AI Response Board</h2>
      </div>
      <a th:if="${puzzleType == 'TRAINING' and packId != null}" th:href="@{/puzzle-cache/training-pack(packId=${packId})}" class="btn" data-i18n="common.backToList">Back to List</a>
      <a th:unless="${puzzleType == 'TRAINING' and packId != null}" th:href="@{/puzzle-cache}" class="btn" data-i18n="common.backToList">Back to List</a>
    </div>

  <section class="section">
    <input type="hidden" id="problemPuzzleId" th:value="${puzzleId}">
    <input type="hidden" id="problemPuzzleIndex">
    <input type="hidden" id="problemBoardStatus">
    <input type="hidden" id="problemAnswer">
    <input type="hidden" id="problemDepth">
    <input type="hidden" id="problemWinColor">
    <input type="hidden" id="currentBoardState">
    <input type="hidden" id="answerPuzzle">

    <div class="board-cache-row">
      <div class="board-viz">
        <canvas id="gomokuBoard" class="gomoku-board" width="480" height="480" aria-label="Interactive Gomoku AI response board" data-i18n="cacheBoard.canvasLabel" data-i18n-aria-label="cacheBoard.canvasLabel">Interactive Gomoku AI response board.</canvas>
        <div class="board-toolbar" aria-label="Board controls">
          <button type="button" class="btn board-icon-btn" id="cacheUndoBtn" title="Previous Move" aria-label="Previous Move" data-i18n-title="puzzleForm.previousMove" data-i18n-aria-label="puzzleForm.previousMove">◀</button>
          <button type="button" class="btn board-icon-btn" id="cacheResetBoardBtn" title="Reset" aria-label="Reset" data-i18n-title="puzzleForm.clearBoard" data-i18n-aria-label="puzzleForm.clearBoard">↺</button>
          <button type="button" class="btn board-icon-btn" id="cacheRedoBtn" title="Next Move" aria-label="Next Move" data-i18n-title="puzzleForm.nextMove" data-i18n-aria-label="puzzleForm.nextMove">▶</button>
        </div>
      </div>

      <div class="cache-actions">
        <button type="button" class="btn btn-primary btn-block" id="toggleResponseInputBtn" data-i18n="cacheBoard.startResponseInput">Input AI Response</button>
        <button type="button" class="btn btn-primary btn-block" id="saveCacheBtn" data-i18n="cacheBoard.answerSave" hidden disabled>Save</button>
      </div>
    </div>
  </section>
  </main>

  <script type="module" th:inline="javascript">
    const API_BASE = '';
    const puzzleType = /*[[${puzzleType}]]*/ 'TRAINING';
    const puzzleId = /*[[${puzzleId}]]*/ 0;
    const selectedPuzzleType = puzzleType;
    const selectedPuzzleId = puzzleId;

    let cacheLocked = false;
    let cacheExtraMove = null;

    const canvas = document.getElementById('gomokuBoard');
    const ctx = canvas.getContext('2d');
    const BOARD_SIZE = 15;
    const CELL_SIZE = 30;
    const MARGIN = 30;
    const CANVAS_LOGICAL_SIZE = 480;

    (function setupCanvasScale() {
      const dpr = globalThis.devicePixelRatio || 1;
      canvas.width = CANVAS_LOGICAL_SIZE * dpr;
      canvas.height = CANVAS_LOGICAL_SIZE * dpr;
      ctx.scale(dpr, dpr);
    })();
    const moves = [];
    const answerMoves = [];
    const cacheRedoStack = [];
    let currentPlayer = 'black';
    let baseBoardMoveCount = 0;
    let puzzleWinColor = '';
    let puzzleLoaded = false;
    let autoLookupTimer = null;
    let autoLookupSequence = 0;
    let lastAutoLookupBoardState = '';

    function toCanvasX(col) { return MARGIN + col * CELL_SIZE; }
    function toCanvasY(row) { return MARGIN + (14 - row) * CELL_SIZE; }

    function drawBoard() {
      ctx.fillStyle = '#F1DCA7';
      ctx.fillRect(0, 0, CANVAS_LOGICAL_SIZE, CANVAS_LOGICAL_SIZE);
      ctx.strokeStyle = '#6F5432';
      ctx.lineWidth = 1;
      for (let i = 0; i < BOARD_SIZE; i++) {
        const pos = MARGIN + i * CELL_SIZE;
        ctx.beginPath();
        ctx.moveTo(pos, MARGIN);
        ctx.lineTo(pos, MARGIN + (BOARD_SIZE - 1) * CELL_SIZE);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(MARGIN, pos);
        ctx.lineTo(MARGIN + (BOARD_SIZE - 1) * CELL_SIZE, pos);
        ctx.stroke();
      }
      const starPoints = [ [3, 3], [3, 11], [7, 7], [11, 3], [11, 11] ];
      starPoints.forEach(([row, col]) => {
        const x = toCanvasX(col);
        const y = toCanvasY(row);
        ctx.fillStyle = '#5E472A';
        ctx.beginPath();
        ctx.arc(x, y, 3, 0, Math.PI * 2);
        ctx.fill();
      });
      ctx.fillStyle = '#5E472A';
      ctx.font = '14px sans-serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      for (let c = 0; c < BOARD_SIZE; c++) {
        ctx.fillText(String.fromCodePoint(65 + c), toCanvasX(c), CANVAS_LOGICAL_SIZE - MARGIN / 2);
      }
      for (let r = 0; r < BOARD_SIZE; r++) {
        ctx.fillText(String(r + 1), MARGIN / 2, toCanvasY(r));
      }
    }

    function drawStone(row, col, player, moveNumber) {
      const x = toCanvasX(col);
      const y = toCanvasY(row);
      ctx.fillStyle = player === 'black' ? '#000' : '#fff';
      ctx.beginPath();
      ctx.arc(x, y, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = player === 'black' ? '#333' : '#999';
      ctx.lineWidth = 1;
      ctx.stroke();
      if (moveNumber) {
        ctx.fillStyle = player === 'black' ? '#fff' : '#000';
        ctx.font = 'bold 12px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(moveNumber, x, y);
      }
    }

    function redrawBoard() {
      drawBoard();
      // Initial puzzle stones: no numbers, same as the editor
      moves.forEach(m => drawStone(m.row, m.col, m.player, null));
      // Answer sequence stones: numbered 1, 2, 3
      answerMoves.forEach((m, i) => drawStone(m.row, m.col, m.player, i + 1));
      // Response being entered: highlighted with a red ring instead of a number
      if (cacheExtraMove) {
        drawStone(cacheExtraMove.row, cacheExtraMove.col, cacheExtraMove.player, null);
        markResponseMove(cacheExtraMove);
      }
    }

    // Highlight the single response move being entered, distinct from answer sequence numbers
    function markResponseMove(m) {
      const x = toCanvasX(m.col), y = toCanvasY(m.row);
      ctx.strokeStyle = '#ff4d4d';
      ctx.lineWidth = 2.5;
      ctx.beginPath();
      ctx.arc(x, y, CELL_SIZE / 2 - 1, 0, Math.PI * 2);
      ctx.stroke();
    }

    // Show currentBoard lock state with the canvas border.
    function updateLockUI() {
      if (cacheLocked) {
        canvas.classList.add('cache-locked');
      } else {
        canvas.classList.remove('cache-locked');
      }
    }

    // Temporarily show the AI response on the board with a translucent ghost stone and green ring; the next redraw removes it
    function drawPreviewStone(m) {
      const x = toCanvasX(m.col), y = toCanvasY(m.row);
      ctx.save();
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = m.player === 'black' ? '#000' : '#fff';
      ctx.beginPath();
      ctx.arc(x, y, CELL_SIZE / 2 - 2, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
      ctx.strokeStyle = '#2ecc71';
      ctx.lineWidth = 3;
      ctx.beginPath();
      ctx.arc(x, y, CELL_SIZE / 2 - 1, 0, Math.PI * 2);
      ctx.stroke();
    }

    function drawVerifyPreview(positionStr, currentBoardState) {
      const parsed = boardStatusToMoves((positionStr || '').toLowerCase());
      if (!parsed.length) return false;
      const baseCount = countMovesInBoardString(currentBoardState);
      const player = baseCount % 2 === 0 ? 'black' : 'white';
      redrawBoard();  // Remove the previous preview and redraw the current board
      drawPreviewStone({ row: parsed[0].row, col: parsed[0].col, player });
      return true;
    }

    function showVerifyResult(text, type) {
      if (type !== 'error') return;
      showCacheMsg(text, false);
    }

    function hideVerifyResult(redraw) {
      if (redraw) redrawBoard();
    }

    function boardStatusToMoves(boardStatus) {
      const result = [];
      if (!boardStatus || boardStatus.trim() === '') return result;
      const regex = /([a-oA-O])(\d{1,2})/g;
      let match;
      let turnBlack = true;
      while ((match = regex.exec(boardStatus)) !== null) {
        const col = match[1].toLowerCase().codePointAt(0) - 'a'.codePointAt(0);
        const row = Number.parseInt(match[2], 10) - 1;
        if (row >= 0 && row < BOARD_SIZE && col >= 0 && col < BOARD_SIZE) {
          result.push({ row, col, player: turnBlack ? 'black' : 'white' });
          turnBlack = !turnBlack;
        }
      }
      return result;
    }

    function movesToBoardStatus(arr) {
      return arr.map(m => {
        const rowChar = String.fromCodePoint('a'.codePointAt(0) + m.col);
        const colNum = m.row + 1;
        return rowChar + colNum;
      }).join('');
    }

    function fullBoardStatusForSnapshot() {
      return movesToBoardStatus([...moves, ...answerMoves]);
    }

    function updateBoardStatusInput() {
      document.getElementById('problemBoardStatus').value = movesToBoardStatus(moves);
      updateDepthAndWinColor();
    }

    function updateAnswerInput() {
      document.getElementById('problemAnswer').value = movesToBoardStatus(answerMoves);
      updateDepthAndWinColor();
    }

    function syncCurrentPlayer() {
      const total = moves.length + answerMoves.length + (cacheExtraMove ? 1 : 0);
      currentPlayer = total % 2 === 0 ? 'black' : 'white';
      syncCacheToolbar();
      syncResponseInputWorkflow();
      syncSaveButton();
    }

    function cloneMove(move) {
      return { row: move.row, col: move.col, player: move.player };
    }

    function syncCacheToolbar() {
      const undoBtn = document.getElementById('cacheUndoBtn');
      const redoBtn = document.getElementById('cacheRedoBtn');
      const canUndo = cacheLocked
              ? Boolean(cacheExtraMove)
              : answerMoves.length > 0 || moves.length > baseBoardMoveCount;
      if (undoBtn) undoBtn.disabled = !canUndo;
      if (redoBtn) redoBtn.disabled = cacheRedoStack.length === 0;
    }

    function clearCacheRedoStack() {
      cacheRedoStack.length = 0;
      syncCacheToolbar();
    }

    function rememberUndoneMove(kind, move) {
      cacheRedoStack.push({ kind, move: cloneMove(move) });
      syncCacheToolbar();
    }

    function countMovesInBoardString(str) {
      if (!str || !str.trim()) return 0;
      const regex = /([a-o])(\d{1,2})/g;
      let count = 0;
      let match;
      while ((match = regex.exec(str)) !== null) {
        const num = Number.parseInt(match[2], 10);
        if (num >= 1 && num <= 15) count++;
      }
      return count;
    }

    function normalizeWinColor(value) {
      const upper = String(value || '').toUpperCase();
      return upper === 'BLACK' || upper === 'WHITE' ? upper : '';
    }

    function setPuzzleWinColor(value) {
      puzzleWinColor = normalizeWinColor(value);
      document.getElementById('problemWinColor').value = puzzleWinColor;
    }

    function getUserPlayer() {
      const color = normalizeWinColor(puzzleWinColor || document.getElementById('problemWinColor').value);
      if (color === 'BLACK') return 'black';
      if (color === 'WHITE') return 'white';
      return null;
    }

    function getAiResponsePlayer() {
      const userPlayer = getUserPlayer();
      if (userPlayer === 'black') return 'white';
      if (userPlayer === 'white') return 'black';
      return null;
    }

    function nextPlayerForMoveCount(moveCount) {
      return moveCount % 2 === 0 ? 'black' : 'white';
    }

    function nextPlayerForBoardState(boardState) {
      return nextPlayerForMoveCount(countMovesInBoardString(boardState));
    }

    function canEnterAiResponseForBoardState(boardState) {
      const responsePlayer = getAiResponsePlayer();
      if (!responsePlayer) return true;
      return nextPlayerForBoardState(boardState) === responsePlayer;
    }

    function showResponseTurnError() {
      showCacheMsg(adminT('cacheBoard.responseTurnOnly'), false);
    }

    function setResponseToggleButton(button, key, primary, disabled) {
      button.dataset.i18n = key;
      button.textContent = adminT(key);
      button.classList.toggle('btn-primary', primary);
      button.classList.toggle('btn-secondary', !primary);
      button.disabled = disabled;
    }

    function canSaveAiResponse() {
      const currentBoardState = document.getElementById('currentBoardState').value.trim();
      const answerPuzzle = document.getElementById('answerPuzzle').value.trim();
      const expectedResponsePlayer = getAiResponsePlayer();
      return cacheLocked &&
             Boolean(cacheExtraMove) &&
             Boolean(currentBoardState) &&
             Boolean(answerPuzzle) &&
             canEnterAiResponseForBoardState(currentBoardState) &&
             (!expectedResponsePlayer || cacheExtraMove.player === expectedResponsePlayer);
    }

    function syncSaveButton() {
      const saveBtn = document.getElementById('saveCacheBtn');
      if (!saveBtn) return;
      saveBtn.hidden = !cacheLocked;
      saveBtn.disabled = !canSaveAiResponse();
    }

    function getCurrentBoardSnapshot() {
      return fullBoardStatusForSnapshot();
    }

    function clearAutoLookup() {
      if (autoLookupTimer) {
        clearTimeout(autoLookupTimer);
        autoLookupTimer = null;
      }
      autoLookupSequence += 1;
    }

    async function lookupAiResponseForBoardState(currentBoardState) {
      if (!currentBoardState || !canEnterAiResponseForBoardState(currentBoardState)) return;
      const sequence = ++autoLookupSequence;
      lastAutoLookupBoardState = currentBoardState;
      try {
        const q = 'puzzleType=' + encodeURIComponent(selectedPuzzleType)
          + '&puzzleId=' + encodeURIComponent(selectedPuzzleId)
          + '&currentBoardState=' + encodeURIComponent(currentBoardState);
        const res = await fetchWithAuth(API_BASE + '/api/puzzle/cache/ai-response?' + q);
        if (!res || sequence !== autoLookupSequence) return;
        const data = await res.json();
        if (sequence !== autoLookupSequence) return;
        if (!data.isSuccess) {
          showVerifyResult(adminT('cacheBoard.lookupFailed'), 'error');
          return;
        }
        const pos = (data.response && data.response.position != null) ? String(data.response.position) : '';
        if (!pos) {
          showVerifyResult(adminT('cacheBoard.noResponse'), 'empty');
          redrawBoard();
          return;
        }
        showVerifyResult(pos.toUpperCase(), 'ok');
        drawVerifyPreview(pos, currentBoardState);
      } catch (err) {
        if (sequence === autoLookupSequence) {
          showVerifyResult(adminT('common.errorPrefix', { message: err.message || '' }), 'error');
        }
      }
    }

    function scheduleAutoLookup(currentBoardState) {
      if (!currentBoardState || cacheLocked || lastAutoLookupBoardState === currentBoardState) return;
      if (autoLookupTimer) clearTimeout(autoLookupTimer);
      autoLookupTimer = setTimeout(() => {
        autoLookupTimer = null;
        lookupAiResponseForBoardState(currentBoardState);
      }, 180);
    }

    function syncResponseInputWorkflow(options = {}) {
      const toggleBtn = document.getElementById('toggleResponseInputBtn');
      const currentBoardEl = document.getElementById('currentBoardState');
      if (!toggleBtn || !currentBoardEl) return;
      if (!puzzleLoaded) {
        setResponseToggleButton(toggleBtn, 'cacheBoard.startResponseInput', true, true);
        return;
      }
      if (cacheLocked) {
        setResponseToggleButton(toggleBtn, 'cacheBoard.cancelResponseInput', false, false);
        return;
      }

      const currentBoardState = getCurrentBoardSnapshot();
      const readyForResponse = Boolean(currentBoardState) && canEnterAiResponseForBoardState(currentBoardState);
      setResponseToggleButton(toggleBtn, 'cacheBoard.startResponseInput', true, !readyForResponse);
      currentBoardEl.value = readyForResponse ? currentBoardState : '';

      if (!readyForResponse) {
        clearAutoLookup();
        lastAutoLookupBoardState = '';
        hideVerifyResult(false);
        return;
      }
      if (options.lookup !== false) {
        scheduleAutoLookup(currentBoardState);
      }
    }

    function updateDepthAndWinColor() {
      const answer = document.getElementById('problemAnswer').value.trim();
      const answerMovesCount = countMovesInBoardString(answer);
      const depthEl = document.getElementById('problemDepth');
      let depthValue = '';
      if (answerMovesCount > 0) {
        depthValue = String(answerMovesCount);
      }
      depthEl.value = depthValue;
      document.getElementById('problemWinColor').value = puzzleWinColor;
    }

    function isBaseOccupied(row, col) {
      return moves.some(m => m.row === row && m.col === col) ||
             answerMoves.some(m => m.row === row && m.col === col);
    }

    function isOccupied(row, col) {
      if (isBaseOccupied(row, col)) return true;
      return !!(cacheExtraMove && cacheExtraMove.row === row && cacheExtraMove.col === col);

    }

    function applyClearAnswerOnly() {
      answerMoves.length = 0;
      clearCacheRedoStack();
      updateAnswerInput();
      redrawBoard();
      syncCurrentPlayer();
    }

    canvas.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const scale = CANVAS_LOGICAL_SIZE / rect.width;  // Responsive display size to logical coordinate correction
      const x = (e.clientX - rect.left) * scale;
      const y = (e.clientY - rect.top) * scale;
      const col = Math.round((x - MARGIN) / CELL_SIZE);
      const row = 14 - Math.round((y - MARGIN) / CELL_SIZE);
      if (row < 0 || row >= BOARD_SIZE || col < 0 || col >= BOARD_SIZE) return;

      if (cacheLocked) {
        if (cacheExtraMove && cacheExtraMove.row === row && cacheExtraMove.col === col) return;
        if (isBaseOccupied(row, col)) return;
        const currentBoardState = document.getElementById('currentBoardState').value.trim() || fullBoardStatusForSnapshot();
        if (!canEnterAiResponseForBoardState(currentBoardState)) {
          showResponseTurnError();
          return;
        }
        const allowed = getAiResponsePlayer() || nextPlayerForBoardState(currentBoardState);
        clearCacheRedoStack();
        clearAutoLookup();
        cacheExtraMove = { row, col, player: allowed };
        document.getElementById('answerPuzzle').value = movesToBoardStatus([cacheExtraMove]).toLowerCase();
        hideVerifyResult(false);
        redrawBoard();
        syncCurrentPlayer();
        return;
      }

      if (isOccupied(row, col)) return;
      const newMove = { row, col, player: currentPlayer };
      clearCacheRedoStack();
      answerMoves.push(newMove);
      updateAnswerInput();
      redrawBoard();
      syncCurrentPlayer();
    });

    document.getElementById('problemBoardStatus').addEventListener('input', (e) => {
      const newMoves = boardStatusToMoves(e.target.value);
      moves.length = 0;
      moves.push(...newMoves);
      baseBoardMoveCount = moves.length;
      answerMoves.length = 0;
      clearCacheRedoStack();
      document.getElementById('problemAnswer').value = '';
      cacheLocked = false;
      cacheExtraMove = null;
      syncCurrentPlayer();
      redrawBoard();
      updateDepthAndWinColor();
      updateLockUI();
      document.getElementById('answerPuzzle').value = '';
    });

    document.getElementById('problemAnswer').addEventListener('input', (e) => {
      const answerStr = e.target.value.trim();
      const parsed = boardStatusToMoves(answerStr);
      answerMoves.length = 0;
      parsed.forEach((m, i) => {
        const player = (moves.length + i) % 2 === 0 ? 'black' : 'white';
        answerMoves.push({ ...m, player });
      });
      clearCacheRedoStack();
      cacheExtraMove = null;
      syncCurrentPlayer();
      redrawBoard();
      updateDepthAndWinColor();
    });

    drawBoard();
    updateLockUI();
    syncCurrentPlayer();

    async function fetchWithAuth(url, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (options.body === undefined || options.body === null) {
        delete headers['Content-Type'];
      }
      const res = await fetch(url, { ...options, headers, credentials: 'same-origin' });
      if (res.status === 401 || res.status === 403) {
        alert(adminT('msg.sessionExpired'));
        globalThis.location.href = '/admin/logout';
        return null;
      }
      return res;
    }

    function clearCacheFormFields() {
      document.getElementById('currentBoardState').value = '';
      document.getElementById('answerPuzzle').value = '';
    }

    function showCacheMsg(text, ok) {
      if (globalThis.adminToast) {
        globalThis.adminToast(text, ok ? 'success' : 'error');
        return;
      }
      alert(text);
    }

    async function loadPuzzleDetail() {
      try {
        puzzleLoaded = false;
        clearAutoLookup();
        lastAutoLookupBoardState = '';
        const detailPath = puzzleType === 'COMMUNITY'
            ? '/admin/community/puzzle-detail/'
            : '/admin/training/puzzle-detail/';
        const res = await fetchWithAuth(API_BASE + detailPath + puzzleId);
        if (!res) return;
        const data = await res.json();
        if (!data.isSuccess) {
          alert(adminT('puzzleForm.failedLoadPuzzle'));
          globalThis.location.href = '/puzzle-cache';
          return;
        }

        const puzzle = data.response || {};
        const boardStatus = (puzzle['boardStatus'] || '').trim();
        const answer = (puzzle['answer'] || '').trim();

        document.getElementById('problemPuzzleId').value = String(puzzle['id'] ?? puzzleId);
        const trainingIndex = puzzle['trainingIndex'];
        document.getElementById('problemPuzzleIndex').value = trainingIndex === null || trainingIndex === undefined ? '' : String(trainingIndex);
        document.getElementById('problemBoardStatus').value = boardStatus;
        document.getElementById('problemAnswer').value = answer;
        const puzzleDepth = String(puzzle['depth'] ?? '');
        document.getElementById('problemDepth').value = puzzleDepth === '0' ? '' : puzzleDepth;
        setPuzzleWinColor(puzzle['winColor'] || '');

        moves.length = 0;
        moves.push(...boardStatusToMoves(boardStatus));
        baseBoardMoveCount = moves.length;

        answerMoves.length = 0;
        const parsedAnswerMoves = boardStatusToMoves(answer);
        parsedAnswerMoves.forEach((m, i) => {
          const player = (moves.length + i) % 2 === 0 ? 'black' : 'white';
          answerMoves.push({ ...m, player });
        });

        cacheExtraMove = null;
        cacheLocked = false;
        clearCacheRedoStack();
        applyClearAnswerOnly();
        clearCacheFormFields();
        syncCurrentPlayer();
        updateLockUI();
        puzzleLoaded = true;
        syncCurrentPlayer();
      } catch (err) {
        alert(adminT('common.errorPrefix', { message: err.message || '' }));
      }
    }

    document.getElementById('cacheResetBoardBtn').addEventListener('click', () => {
      loadPuzzleDetail();
    });

    document.getElementById('toggleResponseInputBtn').addEventListener('click', () => {
      if (cacheLocked) {
        cacheExtraMove = null;
        cacheLocked = false;
        clearCacheRedoStack();
        clearAutoLookup();
        lastAutoLookupBoardState = '';
        document.getElementById('currentBoardState').value = '';
        document.getElementById('answerPuzzle').value = '';
        updateLockUI();
        hideVerifyResult(false);
        redrawBoard();
        syncCurrentPlayer();
        return;
      }

      const currentBoardState = getCurrentBoardSnapshot();
      if (!canEnterAiResponseForBoardState(currentBoardState)) {
        showResponseTurnError();
        return;
      }
      cacheExtraMove = null;
      clearCacheRedoStack();
      clearAutoLookup();
      lastAutoLookupBoardState = currentBoardState;
      document.getElementById('answerPuzzle').value = '';
      document.getElementById('currentBoardState').value = currentBoardState;
      cacheLocked = true;
      updateLockUI();
      hideVerifyResult(false);
      redrawBoard();
      syncCurrentPlayer();
    });

    document.getElementById('cacheUndoBtn').addEventListener('click', () => {
      if (cacheLocked) {
        if (cacheExtraMove) {
          rememberUndoneMove('extra', cacheExtraMove);
          cacheExtraMove = null;
          document.getElementById('answerPuzzle').value = '';
          redrawBoard();
          syncCurrentPlayer();
          return;
        }
        return;
      }
      if (answerMoves.length > 0) {
        const undone = answerMoves.pop();
        rememberUndoneMove('answer', undone);
        updateAnswerInput();
      } else if (moves.length > baseBoardMoveCount) {
        const undone = moves.pop();
        rememberUndoneMove('board', undone);
        updateBoardStatusInput();
      } else return;
      redrawBoard();
      syncCurrentPlayer();
    });

    document.getElementById('cacheRedoBtn').addEventListener('click', () => {
      const entry = cacheRedoStack.pop();
      if (!entry) {
        syncCacheToolbar();
        return;
      }
      const move = cloneMove(entry.move);
      if (entry.kind === 'extra') {
        const currentBoardState = document.getElementById('currentBoardState').value.trim() || fullBoardStatusForSnapshot();
        const expectedResponsePlayer = getAiResponsePlayer();
        if (!cacheLocked || isBaseOccupied(move.row, move.col) || !canEnterAiResponseForBoardState(currentBoardState) ||
            (expectedResponsePlayer && move.player !== expectedResponsePlayer)) {
          syncCurrentPlayer();
          return;
        }
        cacheExtraMove = move;
        document.getElementById('answerPuzzle').value = movesToBoardStatus([cacheExtraMove]).toLowerCase();
      } else if (entry.kind === 'answer') {
        if (isOccupied(move.row, move.col)) {
          syncCurrentPlayer();
          return;
        }
        answerMoves.push(move);
        updateAnswerInput();
      } else if (entry.kind === 'board') {
        if (isOccupied(move.row, move.col)) {
          syncCurrentPlayer();
          return;
        }
        moves.push(move);
        updateBoardStatusInput();
      }
      redrawBoard();
      syncCurrentPlayer();
    });

    document.getElementById('saveCacheBtn').addEventListener('click', async () => {
      const currentBoardState = document.getElementById('currentBoardState').value.trim();
      const answerPuzzle = document.getElementById('answerPuzzle').value.trim().toLowerCase();
      if (!currentBoardState || !answerPuzzle) {
        showCacheMsg(adminT('cacheBoard.needCurrentBoard'), false);
        return;
      }
      if (!canEnterAiResponseForBoardState(currentBoardState)) {
        showCacheMsg(adminT('cacheBoard.responseTurnOnly'), false);
        return;
      }
      const expectedResponsePlayer = getAiResponsePlayer();
      if (expectedResponsePlayer && (!cacheExtraMove || cacheExtraMove.player !== expectedResponsePlayer)) {
        showCacheMsg(adminT('cacheBoard.responseTurnOnly'), false);
        return;
      }
      try {
        const res = await fetchWithAuth(API_BASE + '/api/puzzle/cache/save', {
          method: 'POST',
          body: JSON.stringify({
            puzzleType: selectedPuzzleType,
            puzzleId: selectedPuzzleId,
            currentBoardState,
            answerPuzzle
          })
        });
        if (!res) return;
        const data = await res.json();
        if (!data.isSuccess) {
          showCacheMsg(adminT('cacheBoard.saveFailed'), false);
          return;
        }
        showCacheMsg(adminT('cacheBoard.saved'), true);
      } catch (err) {
        showCacheMsg(adminT('common.errorPrefix', { message: err.message || '' }), false);
      }
    });

    document.addEventListener('admin:language-change', () => {
      updateLockUI();
    });

    await loadPuzzleDetail();
  </script>
</body>
</html>
