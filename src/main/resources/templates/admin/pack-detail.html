<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title.packWorkspace">Renzzle Admin - Pack Workspace</title>
  <link rel="stylesheet" href="/assets/admin/pack-detail.css">
  <link rel="stylesheet" href="/assets/admin/common.css">
  <script src="/assets/admin/i18n.js"></script>
</head>
<body>
  <div class="header">
    <div>
      <h1>Renzzle Admin</h1>
      <span class="user-info" th:if="${userEmail}" th:text="${userEmail}"></span>
    </div>
    <div class="header-actions">
      <th:block th:replace="~{admin/fragments :: languageSelect}"></th:block>
      <a href="/admin/logout" class="btn" data-i18n="common.logout">Log out</a>
    </div>
  </div>

  <th:block th:replace="~{admin/fragments :: siteNav(true, false, false)}"></th:block>
  <th:block th:replace="~{admin/fragments :: uiKit}"></th:block>

  <main class="admin-shell">
    <div class="admin-page-heading">
      <div>
        <h2 data-i18n="packDetail.heading">Pack Workspace</h2>
        <p data-i18n="packDetail.description">Review pack information and manage the puzzles inside this pack.</p>
      </div>
      <div class="admin-actions">
        <a href="/admin/pack-list" class="btn" data-i18n="common.packList">Pack List</a>
      </div>
    </div>

    <section class="pack-context-bar pack-workspace-context" id="packInfoSection">
      <div id="packInfoBox" class="pack-context-main" hidden>
        <div class="pack-context-heading-row">
          <div class="pack-context-kicker" data-i18n="packDetail.infoHeading">Pack Info</div>
          <select id="langSelect" class="pack-language-select" aria-label="Display Language" data-i18n-aria-label="common.displayLanguage">
            <option th:each="langCode : ${langCodeNames}" th:value="${langCode}" th:text="${langCode}">EN</option>
          </select>
        </div>
        <h2 class="pack-context-title" id="packTitle">-</h2>
        <div class="pack-context-meta" aria-label="Pack metadata">
          <span class="pack-context-meta-item"><span data-i18n="common.author">Author</span><strong id="packAuthor">-</strong></span>
          <span class="pack-context-meta-item"><span data-i18n="common.difficulty">Difficulty</span><strong id="packDifficulty">-</strong></span>
          <span class="pack-context-meta-item"><span data-i18n="common.price">Price</span><strong id="packPrice">-</strong></span>
          <span class="pack-context-meta-item"><span data-i18n="common.puzzles">Puzzles</span><strong id="packPuzzleCount">-</strong></span>
        </div>
        <p class="pack-context-description" id="packDescription">-</p>
      </div>
      <div class="pack-context-side">
        <div class="admin-actions pack-context-actions">
          <button type="button" class="btn btn-danger" id="deletePackBtn" data-i18n="packDetail.deletePack">Delete Pack</button>
          <a th:href="@{/admin/pack-create(packId=${packId})}" class="btn" data-i18n="common.editInfo">Edit Info</a>
        </div>
      </div>
    </section>

    <section class="section">
      <div class="section-title-row">
        <div>
          <h2 data-i18n="packDetail.puzzlesHeading">Puzzle List</h2>
          <div id="puzzleListMsg" class="pack-list-count muted-status"></div>
        </div>
        <a th:href="@{/admin/puzzle-add(packId=${packId})}" class="btn btn-primary" data-i18n="common.addPuzzle">Add Puzzle</a>
      </div>
      <div id="puzzleEmptyState" class="admin-empty" hidden>
        <strong data-i18n="packDetail.noPuzzlesStrong">No puzzles yet.</strong>
        <span data-i18n="packDetail.noPuzzlesHelp">Add the first puzzle to this pack.</span>
      </div>
      <div id="puzzleGrid" class="puzzle-preview-grid" hidden></div>
    </section>
  </main>

  <script type="module" th:inline="javascript">
    const API_BASE = '';
    const packId = /*[[${packId}]]*/ 0;
    let packDetail = null;

    async function fetchWithAuth(url, options = {}) {
      const headers = { 'Content-Type': 'application/json', ...options.headers };
      if (options.body === undefined || options.body === null) {
        delete headers['Content-Type'];
      }
      const res = await fetch(url, { ...options, headers, credentials: 'same-origin' });
      if (res.status === 401 || res.status === 403) {
        alert(adminT('msg.sessionExpired'));
        globalThis.location.href = '/admin/logout';
        return null;
      }
      return res;
    }

    function renderPackInfo(detail) {
      const lang = document.getElementById('langSelect').value;
      const infos = detail['info'] || [];
      const info = infos.find(i => i['langCode'] === lang) || infos[0];
      const box = document.getElementById('packInfoBox');
      if (!info) {
        box.hidden = true;
        return;
      }
      box.hidden = false;
      document.getElementById('packDifficulty').textContent = detail['difficulty'] || '-';
      const price = detail['price'];
      const numericPrice = Number(price);
      let priceText = '-';
      if (price != null) {
        if (Number.isFinite(numericPrice)) {
          priceText = numericPrice.toLocaleString();
        } else {
          priceText = String(price);
        }
      }
      document.getElementById('packPrice').textContent = priceText;
      document.getElementById('packPuzzleCount').textContent = String(detail['totalPuzzleCount'] ?? '-');
      document.getElementById('packTitle').textContent = info['title'] || adminT('common.none');
      document.getElementById('packTitle').classList.toggle('empty', !info['title']);
      document.getElementById('packAuthor').textContent = info['author'] || adminT('common.none');
      document.getElementById('packAuthor').classList.toggle('empty', !info['author']);
      const descEl = document.getElementById('packDescription');
      descEl.textContent = info['description'] || adminT('common.noDescription');
      descEl.classList.toggle('empty', !info['description']);
    }

    function boardStatusToMoves(boardStatus) {
      const result = [];
      if (!boardStatus || boardStatus === '-') return result;
      const regex = /([a-oA-O])(\d{1,2})/g;
      let match;
      let turnBlack = true;
      while ((match = regex.exec(boardStatus)) !== null) {
        const col = match[1].toLowerCase().codePointAt(0) - 'a'.codePointAt(0);
        const row = Number.parseInt(match[2], 10) - 1;
        if (row >= 0 && row < 15 && col >= 0 && col < 15) {
          result.push({ row, col, player: turnBlack ? 'black' : 'white' });
          turnBlack = !turnBlack;
        }
      }
      return result;
    }

    function drawPuzzlePreview(canvas, boardStatus) {
      const logicalSize = 180;
      const dpr = globalThis.devicePixelRatio || 1;
      canvas.width = logicalSize * dpr;
      canvas.height = logicalSize * dpr;
      const ctx = canvas.getContext('2d');
      ctx.scale(dpr, dpr);
      ctx.fillStyle = '#F1DCA7';
      ctx.fillRect(0, 0, logicalSize, logicalSize);

      const padding = 14;
      const cell = (logicalSize - padding * 2) / 14;
      const toX = (col) => padding + col * cell;
      const toY = (row) => padding + (14 - row) * cell;

      ctx.strokeStyle = '#6F5432';
      ctx.lineWidth = 0.8;
      for (let i = 0; i < 15; i++) {
        const pos = padding + i * cell;
        ctx.beginPath();
        ctx.moveTo(pos, padding);
        ctx.lineTo(pos, logicalSize - padding);
        ctx.stroke();
        ctx.beginPath();
        ctx.moveTo(padding, pos);
        ctx.lineTo(logicalSize - padding, pos);
        ctx.stroke();
      }

      const starPoints = [
        [3, 3], [3, 11], [7, 7], [11, 3], [11, 11]
      ];
      starPoints.forEach(([row, col]) => {
        ctx.fillStyle = '#5E472A';
        ctx.beginPath();
        ctx.arc(toX(col), toY(row), 1.7, 0, Math.PI * 2);
        ctx.fill();
      });

      boardStatusToMoves(boardStatus).forEach((move) => {
        const x = toX(move.col);
        const y = toY(move.row);
        ctx.fillStyle = move.player === 'black' ? '#111827' : '#ffffff';
        ctx.beginPath();
        ctx.arc(x, y, cell * 0.38, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = move.player === 'black' ? '#111827' : '#9ca3af';
        ctx.lineWidth = 1;
        ctx.stroke();
      });
    }

    function createPuzzleCard(pz, idx) {
      const puzzleIdValue = pz['id'];
      const rawPuzzleIndex = pz['trainingIndex'];
      let parsedPuzzleIndex = Number.NaN;
      if (rawPuzzleIndex != null) {
        parsedPuzzleIndex = Number(rawPuzzleIndex);
      }
      let puzzleNumber = idx + 1;
      if (Number.isFinite(parsedPuzzleIndex)) {
        puzzleNumber = parsedPuzzleIndex + 1;
      }
      const boardStatus = pz['boardStatus'] || '-';
      const winColor = pz['winColor'] || '-';
      const editUrl = '/admin/puzzle-edit?packId=' + packId + '&puzzleId=' + puzzleIdValue;

      const card = document.createElement('a');
      card.href = editUrl;
      card.className = 'puzzle-preview-card';
      card.setAttribute('aria-label', adminT('packDetail.openPuzzle', { number: puzzleNumber }));

      const header = document.createElement('div');
      header.className = 'puzzle-preview-header';
      const number = document.createElement('span');
      number.className = 'puzzle-preview-number';
      number.textContent = adminT('packDetail.puzzleNumber', { number: puzzleNumber });
      const color = document.createElement('span');
      const normalizedColor = String(winColor).toLowerCase();
      let colorClassName = 'puzzle-preview-color';
      if (normalizedColor === 'black') {
        colorClassName += ' is-black';
      } else if (normalizedColor === 'white') {
        colorClassName += ' is-white';
      }
      color.className = colorClassName;
      color.textContent = winColor;
      header.appendChild(number);
      header.appendChild(color);

      const canvas = document.createElement('canvas');
      canvas.className = 'puzzle-preview-board';
      canvas.setAttribute('aria-hidden', 'true');
      drawPuzzlePreview(canvas, boardStatus);

      card.appendChild(header);
      card.appendChild(canvas);
      return card;
    }

    async function loadPackDetail() {
      try {
        const res = await fetchWithAuth(API_BASE + '/admin/training/pack/' + packId);
        if (!res) return;
        const data = await res.json();
        if (!data.isSuccess) {
          alert(adminT('packDetail.failedLoadPack'));
          globalThis.location.href = '/admin/pack-list';
          return;
        }
        packDetail = data.response;
        renderPackInfo(data.response);
      } catch (err) {
        alert(adminT('common.errorPrefix', { message: err.message || '' }));
        globalThis.location.href = '/admin/pack-list';
      }
    }

    async function loadPuzzleList() {
      const puzzleGrid = document.getElementById('puzzleGrid');
      const emptyState = document.getElementById('puzzleEmptyState');
      const msgEl = document.getElementById('puzzleListMsg');
      puzzleGrid.innerHTML = '';
      puzzleGrid.hidden = true;
      emptyState.hidden = true;
      msgEl.textContent = adminT('common.loading');
      try {
        const res = await fetchWithAuth(API_BASE + '/admin/training/puzzle/' + packId);
        if (!res) return;
        const data = await res.json();
        if (!data.isSuccess) {
          emptyState.hidden = false;
          msgEl.textContent = adminT('packDetail.count', { count: 0 });
          return;
        }
        const puzzles = data.response || [];
        msgEl.textContent = adminT('packDetail.count', { count: puzzles.length });
        if (puzzles.length === 0) {
          emptyState.hidden = false;
        } else {
          puzzleGrid.hidden = false;
          puzzles.forEach((pz, idx) => {
            puzzleGrid.appendChild(createPuzzleCard(pz, idx));
          });
        }
      } catch (err) {
        msgEl.textContent = adminT('common.errorPrefix', { message: err.message || '' });
      }
    }

    document.getElementById('langSelect').addEventListener('change', () => {
      if (packDetail) renderPackInfo(packDetail);
    });
    document.addEventListener('admin:language-change', async () => {
      if (packDetail) renderPackInfo(packDetail);
      await loadPuzzleList();
    });

    document.getElementById('deletePackBtn').addEventListener('click', async () => {
      const title = document.getElementById('packTitle').textContent;
      const ok = await adminConfirm(adminT('packList.deleteConfirm', { title }), {
        confirmText: adminT('common.delete'),
        danger: true
      });
      if (!ok) return;
      try {
        const res = await fetchWithAuth(API_BASE + '/api/training/pack/' + packId, { method: 'DELETE' });
        if (!res) return;
        const data = await res.json();
        if (!data.isSuccess) {
          adminToast(adminT('packList.deleteFailed'), 'error');
          return;
        }
        adminToast(adminT('packList.deleted'), 'success');
        setTimeout(() => { globalThis.location.href = '/admin/pack-list'; }, 500);
      } catch (err) {
        adminToast(adminT('common.errorPrefix', { message: err.message || '' }), 'error');
      }
    });

    await loadPackDetail();
    await loadPuzzleList();
  </script>
</body>
</html>
