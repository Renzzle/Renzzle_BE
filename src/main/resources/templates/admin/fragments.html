<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Renzzle Admin Fragments</title>
</head>
<body>
<!-- Main navigation. Existing arguments are kept for compatibility and active-state display. -->
<th:block th:fragment="siteNav(hidePackList, hidePackCreate, hidePuzzleCache)">
  <nav class="site-nav-wrap" aria-label="Main menu">
    <div class="site-nav">
      <a th:classappend="${hidePackList} ? 'active'" th:href="@{/admin/pack-list}">Pack</a>
      <a th:classappend="${hidePackCreate} ? 'active'" th:href="@{/admin/pack-create}">New Pack</a>
      <a th:classappend="${hidePuzzleCache} ? 'active'" th:href="@{/puzzle-cache}">Response Moves</a>
    </div>
  </nav>
</th:block>

<!-- Shared UI kit: toast and confirm modal (globalThis.adminToast / globalThis.adminConfirm) -->
<div th:fragment="uiKit" class="admin-ui-kit">
  <div id="adminToastWrap"></div>
  <dialog id="adminModalDialog" class="admin-modal" aria-labelledby="adminModalMsg">
    <div class="modal-msg" id="adminModalMsg"></div>
    <div class="modal-actions">
      <button type="button" class="modal-btn" id="adminModalCancel">Cancel</button>
      <button type="button" class="modal-btn danger" id="adminModalOk">Check</button>
    </div>
  </dialog>
  <script>
    (function () {
      globalThis.adminToast = function (message, type) {
        let wrap = document.getElementById('adminToastWrap');
        if (!wrap) { alert(message); return; }
        let el = document.createElement('div');
        el.className = 'admin-toast' + (type ? ' ' + type : '');
        el.textContent = message;
        wrap.appendChild(el);
        requestAnimationFrame(function () { el.classList.add('show'); });
        setTimeout(function () {
          el.classList.remove('show');
          setTimeout(function () { el.remove(); }, 250);
        }, 3000);
      };
      globalThis.adminConfirm = function (message, opts) {
        opts = opts || {};
        return new Promise(function (resolve) {
          let dialog = document.getElementById('adminModalDialog');
          if (!dialog) { resolve(globalThis.confirm(message)); return; }
          let msg = document.getElementById('adminModalMsg');
          let ok = document.getElementById('adminModalOk');
          let cancel = document.getElementById('adminModalCancel');
          msg.textContent = message;
          ok.textContent = opts.confirmText || 'Check';
          cancel.textContent = opts.cancelText || 'Cancel';
          ok.className = 'modal-btn ' + (opts.danger === false ? 'primary' : 'danger');
          if (typeof dialog.showModal === 'function') {
            dialog.showModal();
          } else {
            dialog.setAttribute('open', '');
          }
          function cleanup(result) {
            if (dialog.open && typeof dialog.close === 'function') {
              dialog.close();
            } else {
              dialog.removeAttribute('open');
            }
            ok.removeEventListener('click', onOk);
            cancel.removeEventListener('click', onCancel);
            dialog.removeEventListener('click', onBackdrop);
            dialog.removeEventListener('cancel', onCancel);
            resolve(result);
          }
          function onOk() { cleanup(true); }
          function onCancel(e) {
            if (e) e.preventDefault();
            cleanup(false);
          }
          function onBackdrop(e) {
            const rect = dialog.getBoundingClientRect();
            const outside = e.clientX < rect.left || e.clientX > rect.right
              || e.clientY < rect.top || e.clientY > rect.bottom;
            if (outside) cleanup(false);
          }
          ok.addEventListener('click', onOk);
          cancel.addEventListener('click', onCancel);
          dialog.addEventListener('click', onBackdrop);
          dialog.addEventListener('cancel', onCancel);
        });
      };
    })();
  </script>
</div>
</body>
</html>
