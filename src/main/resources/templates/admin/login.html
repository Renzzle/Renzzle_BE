<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Renzzle Admin Login</title>
  <link rel="stylesheet" href="/assets/admin/pages/login.css">
  <link rel="stylesheet" href="/assets/admin/admin.css">
</head>
<body>
  <div class="login-card">
    <h1>Renzzle Admin</h1>
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter email" required>
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" required>
    <button type="button" id="loginBtn">Log in</button>
    <div class="msg" id="message"></div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const messageDiv = document.getElementById('message');

    function showMessage(text, isError) {
      messageDiv.textContent = text;
      messageDiv.className = isError ? 'msg error' : 'msg success';
      messageDiv.classList.add('show');
    }

    loginBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showMessage('Enter both email and password.', true);
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = 'Logging in...';

      try {
        // 1. Call the admin login API (12-hour token)
        const loginRes = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, password })
        });

        if (!loginRes.ok) {
          let errorMessage = 'Login failed';
          try {
            const errorData = await loginRes.json();
            errorMessage = errorData?.errorResponse?.message || errorData?.message || errorMessage;
          } catch {
            // Keep the default message when the error response is not JSON.
          }
          showMessage(errorMessage, true);
          loginBtn.disabled = false;
          loginBtn.textContent = 'Log in';
          return;
        }

        await loginRes.json();

        showMessage('Login successful. Opening the pack list...', false);

        // 3. Redirect to the pack list (first screen)
        setTimeout(() => {
          globalThis.location.href = '/admin/pack-list';
        }, 1000);

      } catch (err) {
        showMessage(err.message || 'An error occurred during login.', true);
        loginBtn.disabled = false;
        loginBtn.textContent = 'Log in';
      }
    });

    // Log in with Enter
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
