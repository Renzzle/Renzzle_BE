<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="title.login">Renzzle Admin Login</title>
  <link rel="stylesheet" href="/assets/admin/login.css">
  <link rel="stylesheet" href="/assets/admin/common.css">
  <script src="/assets/admin/i18n.js"></script>
</head>
<body>
  <div class="login-card">
    <h1 data-i18n="login.heading">Renzzle Admin</h1>
    <label for="email" data-i18n="login.email">Email</label>
    <input type="email" id="email" data-i18n-placeholder="login.emailPlaceholder" placeholder="Enter email" required>
    <label for="password" data-i18n="login.password">Password</label>
    <input type="password" id="password" data-i18n-placeholder="login.passwordPlaceholder" placeholder="Enter password" required>
    <button type="button" id="loginBtn" data-i18n="login.login">Log in</button>
    <div class="msg" id="message"></div>
  </div>

  <script>
    const loginBtn = document.getElementById('loginBtn');
    const emailInput = document.getElementById('email');
    const passwordInput = document.getElementById('password');
    const messageDiv = document.getElementById('message');

    function showMessage(text, isError) {
      messageDiv.textContent = text;
      messageDiv.className = isError ? 'msg error' : 'msg success';
      messageDiv.classList.add('show');
    }

    loginBtn.addEventListener('click', async () => {
      const email = emailInput.value.trim();
      const password = passwordInput.value.trim();

      if (!email || !password) {
        showMessage(adminT('login.required'), true);
        return;
      }

      loginBtn.disabled = true;
      loginBtn.textContent = adminT('login.loggingIn');

      try {
        // 1. Call the admin login API (12-hour token)
        const loginRes = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          credentials: 'same-origin',
          body: JSON.stringify({ email, password })
        });

        if (!loginRes.ok) {
          let errorMessage = adminT('login.failed');
          try {
            const errorData = await loginRes.json();
            errorMessage = errorData?.errorResponse?.message || errorData?.message || errorMessage;
          } catch {
            // Keep the default message when the error response is not JSON.
          }
          showMessage(errorMessage, true);
          loginBtn.disabled = false;
          loginBtn.textContent = adminT('login.login');
          return;
        }

        await loginRes.json();
        globalThis.location.href = '/admin/pack-list';

      } catch (err) {
        showMessage(err.message || adminT('login.error'), true);
        loginBtn.disabled = false;
        loginBtn.textContent = adminT('login.login');
      }
    });

    // Log in with Enter
    passwordInput.addEventListener('keypress', (e) => {
      if (e.key === 'Enter') loginBtn.click();
    });
  </script>
</body>
</html>
