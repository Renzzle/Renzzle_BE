name: Deploy to EC2 on Comment

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  actions: write

jobs:
  deploy:
    runs-on: ubuntu-24.04
    if: >
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/renzzle deploy') &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association)

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Build and Test with Gradle
        env:
          DB_ADDRESS: ${{ secrets.DB_ADDRESS }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}

          # 백업 DB 환경변수
          BACKUP_DB_URL: ${{ secrets.BACKUP_DB_URL}}
          BACKUP_DB_USER: ${{ secrets.BACKUP_DB_USER }}
          BACKUP_DB_PASSWORD: ${{ secrets.BACKUP_DB_PASSWORD }}
        run: ./gradlew build -x test --stacktrace

      - name: Verify Docker environment
        run: docker version

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: renzzle/github-action:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Copy Docker Compose file to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: renzzle.official
          key: ${{ secrets.PRIVATE_KEY }}
          source: './docker-compose.yml'
          target: '/home/renzzle.official/'
          port: 22
          timeout: 30s
          command_timeout: 10m
          debug: true
          overwrite: true

      - name: Remove existing promtail dir on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: renzzle.official
          key: ${{ secrets.PRIVATE_KEY }}
          script: sudo rm -rf /home/renzzle.official/promtail

      - name: Copy Promtail config to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: renzzle.official
          key: ${{ secrets.PRIVATE_KEY }}
          source: './promtail'
          target: '/home/renzzle.official/'
          port: 22
          timeout: 30s
          command_timeout: 10m
          overwrite: true

      - name: Create .env file and copy to EC2
        run: |
          echo "APP_IMAGE=renzzle/github-action:latest" >> .env
          echo "DB_ADDRESS=db:3306/${{ secrets.DB_NAME }}" >> .env
          echo "DB_USER=${{ secrets.DB_USER }}" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          echo "DB_ROOT_PASSWORD=${{ secrets.DB_ROOT_PASSWORD }}" >> .env
          echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
          echo "REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}" >> .env
          echo "GMAIL_PASSWORD=${{ secrets.GMAIL_PASSWORD }}" >> .env
          echo "GMAIL_ADDRESS=\"${{ secrets.GMAIL_ADDRESS }}\"" >> .env
          echo "JWT_SECRET_KEY=\"${{ secrets.JWT_SECRET_KEY }}\"" >> .env
          echo "BACKUP_DB_URL=${{ secrets.BACKUP_DB_URL }}" >> .env
          echo "BACKUP_DB_USER=\"${{ secrets.BACKUP_DB_USER }}\"" >> .env
          echo "BACKUP_DB_PASSWORD=\"${{ secrets.BACKUP_DB_PASSWORD }}\"" >> .env
          echo "LOKI_TOKEN=${{ secrets.LOKI_TOKEN }}" >> .env

      - name: Copy .env file to EC2
        uses: appleboy/scp-action@master
        with:
          host: ${{ secrets.HOST }}
          username: renzzle.official
          key: ${{ secrets.PRIVATE_KEY }}
          source: './.env'
          target: '/home/renzzle.official/'

      - name: Deploy to EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: renzzle.official
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            set -e
            cd /home/renzzle.official/
            
            docker compose -f docker-compose.yml --profile observability down
            docker compose -f docker-compose.yml --profile observability pull
            docker compose -f docker-compose.yml --profile observability up -d
            
            # check container status
            echo "Running containers:"
            docker ps

      - name: Remove unused Docker images
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: renzzle.official
          key: ${{ secrets.PRIVATE_KEY }}
          script: |
            docker image prune -f
