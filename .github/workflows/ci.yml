name: Java CI with Gradle

on:
  pull_request:
    branches: [ "main", "develop" ]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Docker environment preflight
        run: |
          docker version
          docker info
          docker context ls
          docker context inspect "$(docker context show)"
          ls -l /var/run/docker.sock || true

      - name: Resolve Docker Host
        id: docker_host
        run: |
          DOCKER_CONTEXT_HOST=$(docker context inspect "$(docker context show)" --format '{{ (index .Endpoints "docker").Host }}' 2>/dev/null || true)
          if [ -z "$DOCKER_CONTEXT_HOST" ] || [ "$DOCKER_CONTEXT_HOST" = "<no value>" ] || [ "$DOCKER_CONTEXT_HOST" = "null" ]; then
            DOCKER_CONTEXT_HOST="unix:///var/run/docker.sock"
          fi
          if ! echo "$DOCKER_CONTEXT_HOST" | grep -Eq '^[a-z]+://'; then
            echo "Invalid Docker host resolved: $DOCKER_CONTEXT_HOST"
            docker context inspect "$(docker context show)" || true
            exit 1
          fi
          echo "docker_host=$DOCKER_CONTEXT_HOST" >> $GITHUB_OUTPUT
          echo "Resolved DOCKER_HOST=$DOCKER_CONTEXT_HOST"
          echo "docker_host=$DOCKER_CONTEXT_HOST" >> $GITHUB_OUTPUT
          echo "Resolved DOCKER_HOST=$DOCKER_CONTEXT_HOST"
          
          
      - name: Create Google Play service account file
        run: |
          mkdir -p secrets
          cat > secrets/google-play-service-account.json <<'EOF'
          ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          EOF
          
      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Verify Environment Variables Before Build
        run: |
          echo "DOCKER_HOST = ${{ steps.docker_host.outputs.docker_host }}"
          env | grep -E '^DOCKER' | sort
          docker ps --format 'table {{.Names}}\t{{.Status}}'

      - name: Verify Docker Access For Testcontainers
        env:
          DOCKER_HOST: ${{ steps.docker_host.outputs.docker_host }}
        run: |
          docker version
          docker ps --format 'table {{.Names}}\t{{.Status}}'

      - name: Normalize Testcontainers Docker Strategy
        run: |
          rm -f ~/.testcontainers.properties
          cat <<'EOF' > ~/.testcontainers.properties
          docker.client.strategy=org.testcontainers.dockerclient.UnixSocketClientProviderStrategy
          docker.host=unix:///var/run/docker.sock
          EOF
          cat ~/.testcontainers.properties

      - name: Build and Test with Gradle
        env:
          SPRING_PROFILES_ACTIVE: test
          DB_ADDRESS: ${{ secrets.DB_ADDRESS }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          REDIS_PASSWORD: ${{ secrets.REDIS_PASSWORD }}
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_PASSWORD: ${{ secrets.GMAIL_PASSWORD }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          GOOGLE_PLAY_PACKAGE_NAME: com.renzzle_fe
          GOOGLE_APPLICATION_CREDENTIALS: secrets/google-play-service-account.json
          DOCKER_HOST: ${{ steps.docker_host.outputs.docker_host }}
          DOCKER_API_VERSION: "1.44"
          TESTCONTAINERS_HOST_OVERRIDE: localhost
          TESTCONTAINERS_DOCKER_SOCKET_OVERRIDE: /var/run/docker.sock
          TESTCONTAINERS_DOCKER_CLIENT_STRATEGY: org.testcontainers.dockerclient.UnixSocketClientProviderStrategy
          TESTCONTAINERS_CHECKS_DISABLE: true
          TESTCONTAINERS_RYUK_DISABLED: true
        run: ./gradlew --no-daemon build --stacktrace

      - name: Test build success
        run: echo "Build completed successfully!"
